# The quxbuild.yaml file defines 1 or more top level targets.
# Each target must define a list of modules, a platform, and a cpu type.

linux-x64:
  platform: linux
  cpu: x64
  modules:
    RUNTIME:
      source: runtime
    foolib:
      source: foolib1_0
    barlib:
      source: barlib2_1
    main:
      options:
        option_num: 5
      source: main



linux-arm64:
  modules:
    RUNTIME:
      source: runtime
    foolib:
      source: foolib1_0
    barlib:
      source: barlib2_1
    main:
      options:
        option_num: 5
      source: main
  platform: linux
  cpu: ARM64
  outputs:
    app:
      type: executable
    app.dbg:
      type: executable
      backend_llvm_options:
        mode: debug

linux-x86:
  modules:
    RUNTIME:
      source: runtime
    foolib:
      source: foolib1_0
    barlib:
      source: barlib2_0
    main:
      options:
        option_num: 5
      source: main
  platform: linux
  cpu: x86
  outputs:
    app:
      type: executable
    app-dbg:
      type: executable
      backend_llvm_options:
        mode: debug

